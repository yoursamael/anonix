<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />

  <title>Start Anonymous Chat | Anonyx</title>
  <meta
    name="description"
    content="Start anonymous chat on Anonyx and talk to strangers instantly. Free random chat, no signup required."
  />
  <meta name="robots" content="index, follow" />

  <meta property="og:title" content="Start Anonymous Chat | Anonyx" />
  <meta
    property="og:description"
    content="Talk to strangers instantly with free anonymous chat on Anonyx."
  />
  <meta property="og:url" content="https://anonyx.online/chat" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://anonyx.online/og-image.jpg" />

  <link rel="canonical" href="https://anonyx.online/chat" />
  <link rel="icon" href="/favicon.ico" />
  <link rel="stylesheet" href="/style.css" />
  <link rel="stylesheet" href="/anonyx.css" />
</head>
<body>
  <div class="chat-page">
    <header class="chat-header">
      <div class="chat-header-inner">
        <a href="/" class="chat-logo">Anonyx</a>

        <div class="chat-status">
          <span class="status-dot"></span>
          <span id="online">Users Online: 0</span>
        </div>
      </div>
    </header>

    <main class="chat-main">
      <section id="setup" class="setup-card">
        <div class="setup-top">
          <span class="setup-badge">Anonymous • Random • Instant</span>
          <h1>Start Anonymous Chat</h1>
          <p>
            Choose your preferences and get connected with a stranger instantly.
            No signup. No profile. Just simple anonymous chat.
          </p>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label for="gender">Your Gender</label>
            <select id="gender">
              <option value="male">Male</option>
              <option value="female">Female</option>
            </select>
          </div>

          <div class="form-group">
            <label for="preference">Interested In</label>
            <select id="preference">
              <option value="male">Male</option>
              <option value="female">Female</option>
              <option value="both">Both</option>
            </select>
          </div>
        </div>

        <div class="setup-actions">
          <button onclick="startChat()" type="button" class="btn btn-primary">
            Start Chat
          </button>
          <a href="/" class="btn btn-secondary">Back Home</a>
        </div>
      </section>

      <section id="chat" class="chat-card" style="display: none;">
        <div class="chat-topbar">
          <div>
            <h2>Anonymous Chat Room</h2>
            <p>Be respectful. Do not share personal information.</p>
          </div>

          <button onclick="skip()" type="button" class="btn btn-secondary">
            Skip Stranger
          </button>
        </div>

        <div id="messages" class="messages-box"></div>

        <div id="typing" class="typing-box"></div>

        <div id="replyBox" class="reply-box">
          <div id="replyText"></div>
          <button
            id="cancelReplyBtn"
            onclick="cancelReply()"
            type="button"
            aria-label="Cancel reply"
          >
            ✕
          </button>
        </div>

        <div class="input-bar">
          <input
            id="msg"
            type="text"
            placeholder="Type your message..."
            autocomplete="off"
          />

          <input type="file" id="imgInput" accept="image/*" />

          <button
            onclick="document.getElementById('imgInput').click()"
            type="button"
            class="btn btn-secondary image-upload-btn"
          >
            Image
          </button>

          <button onclick="sendMsg()" type="button" class="btn btn-primary">
            Send
          </button>
        </div>
      </section>
    </main>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/script.js"></script>
</body>
</html>
