<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#070b16">
  <title>Anonyx Pro | Secure Console Login</title>

  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/style.css" />
  <link rel="stylesheet" href="/admin-login.css" />

  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="admin-login-route">
  <div class="admin-auth">
    <div class="admin-auth-card glass glass--strong glass--glow">
      <div class="admin-auth-brand" aria-label="Anonyx Pro Admin">
        <i data-lucide="shield-check" class="icon icon-xl" aria-hidden="true"></i>
        <div class="admin-auth-title">ANONYX <span class="pro">PRO</span></div>
      </div>

      <h1>Administrative access</h1>
      <p>Sign in to manage the platform infrastructure.</p>

      <div class="admin-auth-form" role="form" aria-label="Admin login">
        <div>
          <label class="admin-auth-label" for="username">Operator username</label>
          <div class="admin-auth-field">
            <i data-lucide="user" class="icon" aria-hidden="true"></i>
            <input id="username" class="admin-auth-input" type="text" placeholder="e.g. admin" autocomplete="username" inputmode="text">
          </div>
        </div>

        <div>
          <label class="admin-auth-label" for="password">Security key</label>
          <div class="admin-auth-field">
            <i data-lucide="lock" class="icon" aria-hidden="true"></i>
            <input id="password" class="admin-auth-input" type="password" placeholder="••••••••" autocomplete="current-password">
          </div>
        </div>

        <button id="loginBtn" type="button" class="btn btn-primary admin-auth-btn">
          <span id="loginBtnLabel">Verify credentials</span>
          <span class="admin-auth-btn-icon" aria-hidden="true"><i data-lucide="corner-down-right" class="icon"></i></span>
          <span id="loginBtnSpinner" class="loader-spin hidden" aria-hidden="true"></span>
        </button>

        <div id="msg" role="status" aria-live="polite"></div>
      </div>
    </div>
  </div>

  <script src="/js/admin-login.js"></script>
</body>
</html>
